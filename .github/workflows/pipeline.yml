name: Insurance Data Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Generate data
      run: python3 src/generate_data.py

    - name: Run validation
      run: python3 src/validate.py

    - name: Run transformation
      run: python3 src/transform.py

    - name: Run tests
      run: pytest tests/ -v
